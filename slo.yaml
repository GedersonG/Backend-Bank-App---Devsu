version: "1.0"
service: "bank-backend"
owner: "SRE Team"

slos:
  - name: "api-availability"
    objective: 99.9
    description: "API responds with 2xx or 4xx"
    window: 30d
    backend: prometheus
    query: |
      sum(rate(http_server_requests_seconds_count{status=~"[2-4][0-9][0-9]"}[5m])) /
      sum(rate(http_server_requests_seconds_count[5m]))

  - name: "api-latency"
    objective: 99
    description: "P95 latency under 500ms"
    window: 7d
    backend: prometheus
    query: |
      histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])))

error_budget:
  monthly_minutes: 43.8  # Para 99.9% SLO
  alert_when_remaining_percent: 20
  action_when_exhausted: "FREEZE_DEPLOYMENTS"