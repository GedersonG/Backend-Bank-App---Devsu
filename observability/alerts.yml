groups:
  - name: backend_alerts
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on backend"
          description: "Error rate is {{ $value }}% for 5 minutes"

      - alert: ServiceDown
        expr: up{job="bank-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend service is down"