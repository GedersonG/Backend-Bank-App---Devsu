name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests only (skip integration tests)
        run: |
          ./gradlew clean build -x test
          ./gradlew test --tests "com.devsu.app.application.usecase.*"

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            build/reports/tests/test/

      - name: Upload JAR file
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: build/libs/*.jar

  validate-observability:
    name: Validate Observability Config
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate OpenTelemetry config
        run: |
          # Verificar que el archivo YAML es válido
          python -c "import yaml; yaml.safe_load(open('observability/otel-collector-config.yaml'))"

      - name: Validate Tempo config
        run: |
          python -c "import yaml; yaml.safe_load(open('observability/tempo.yaml'))"

      - name: Check SLO file syntax
        run: |
          python -c "import yaml; yaml.safe_load(open('slo.yaml'))"

      - name: Upload observability configs
        uses: actions/upload-artifact@v4
        with:
          name: observability-configs
          path: observability/

  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR for Docker
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bank-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bank-backend:${{ github.sha }}