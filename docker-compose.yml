services:
  db:
    image: postgres:15-alpine
    container_name: bank_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bank_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bank_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: bank_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo
    networks:
      - observability

  tempo:
    image: grafana/tempo:latest
    container_name: bank_tempo
    user: root
    command: [ "-config.file=/etc/tempo/tempo.yaml" ]
    volumes:
      - ./observability:/etc/tempo
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - observability

  promtail:
    image: grafana/promtail:latest
    container_name: bank_promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - observability

  loki:
    image: grafana/loki:3.0.0
    container_name: bank_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - observability

  prometheus:
    image: prom/prometheus:latest
    container_name: bank_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: bank_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus
    networks:
      - observability

  app:
    build: .
    container_name: bank_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_R2DBC_URL: r2dbc:postgresql://db:5432/bank_db
      DB_JDBC_URL: jdbc:postgresql://db:5432/bank_db
      DB_USERNAME: user
      DB_PASSWORD: password
      APP_NAME: bank-service
    ports:
      - "8080:8080"
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  postgres_data:
  loki_data:
  prometheus_data:
  grafana_data:
  tempo_data: